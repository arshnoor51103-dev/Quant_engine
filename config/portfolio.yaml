# portfolio.yaml — locked-in portfolio configuration
# Edit only with corresponding LEARNING.md entry.

# RESERVED: wired up in Phase X — do not remove.
operator: arsh
account_type: TFSA
broker: wealthsimple
base_currency: CAD

# Capital tier auto-detected from current NAV
# Tier 1: $0-$10k — current
# Tier 2: $10k-$25k
# Tier 3: $25k-$50k
# Tier 4: $50k+
# RESERVED: wired up in Phase X — do not remove.
capital_tier: 1
# RESERVED: wired up in Phase X — do not remove.
contribution_room: 35000
monthly_contribution: 350  # midpoint of $300-400 range

# 3-bucket hybrid allocation
# Optimizer optimizes WITHIN buckets. Bucket weights shift only on regime signals.
allocation:
  growth:
    target: 0.60
    tolerance: 0.10   # 50-70%
  stable:
    target: 0.25
    tolerance: 0.05   # 20-30%
  dividend:
    target: 0.15
    tolerance: 0.05   # 10-20%

# Risk constraints
# RESERVED: wired up in Phase X — do not remove.
risk:
  max_drawdown: 0.20         # soft ceiling — alerts fire at 15%
  drawdown_alert: 0.15
  horizon_years: 5           # midpoint of 3-7 year range
  benchmark_primary: VBAL.TO # interim
  benchmark_stretch: VFV.TO  # S&P 500 CAD
  risk_free_rate: 0.045      # 1yr GoC, refresh quarterly

# Trade cost thresholds
trading:
  # RESERVED: wired up in Phase X — do not remove.
  default_cadence: monthly
  # RESERVED: wired up in Phase X — do not remove.
  intra_month_allowed: true
  trade_threshold_multiplier: 2.0   # signal must exceed 2x bid-ask spread
  profit_floor: 0.005               # +0.5% above cost to fire trade
  max_trades_per_year: 24           # hard cap to stay clear of CRA day-trade definition
  cra_warn_threshold: 20            # warn when approaching annual trade limit
  min_holding_days: 14              # minimum hold to not look like day-trading
  spread_proxy: 0.0005              # 0.05% universal spread estimate; revisit at Tier 3 when 6bp differentials matter
  anchor_return_annualized: 0.1398  # expected return anchor from 2026-05-19 backtest run; update after major reruns

# Rebalance triggers
# RESERVED: wired up in Phase X — do not remove.
rebalance:
  drift_threshold: 0.05      # rebalance bucket if drift > 5%
  scheduled_review: monthly  # 1st market day of each month

# Within-bucket Markowitz optimizer (Phase 3 P2)
# Stable bucket always uses equal-weight regardless of these settings.
optimizer:
  risk_aversion: 2.0          # lambda in w'mu - (lambda/2) * w'Sigma*w
  max_position_pct: 0.40      # no single ticker > 40% of its bucket
  min_position_pct: 0.05      # if included, must be >= 5% of bucket
  rebalance_threshold_pct: 0.02  # suppress trade cards for weight changes < 2%
